<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">


<title>

KivuStream | Manage Movies

</title>



<link rel="icon"
href="../assets/logo.png">



<link rel="stylesheet"
href="css/admin.css">



<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css">



</head>


<body>


<div class="admin-wrapper">



<!-- ======================
 SIDEBAR
====================== -->


<aside class="sidebar">


<div class="sidebar-logo">


<img src="../assets/logo.png">


<h2>

KivuStream

</h2>


<span>

ADMIN

</span>


</div>



<nav class="sidebar-menu">


<a href="index.html">

<i class="fa-solid fa-house"></i>

Dashboard

</a>



<a href="add-movie.html">

<i class="fa-solid fa-plus"></i>

Add Movie

</a>




<a class="active"
href="manage-movies.html">


<i class="fa-solid fa-film"></i>

Manage Movies

</a>




<a href="manage-series.html">


<i class="fa-solid fa-tv"></i>

Manage Series

</a>



</nav>



</aside>







<!-- ======================
 MAIN
====================== -->


<main class="admin-main">



<header class="admin-topbar">


<h1>

Manage Movies

</h1>



<div class="admin-profile">


<img src="../assets/logo.png">


<span>

Admin

</span>


</div>



</header>







<section class="dashboard-header">


<div>


<h2>

Movie Library 🎬

</h2>


<p>

Manage all KivuStream movies stored in Supabase.

</p>


</div>




<a href="add-movie.html"

class="primary-btn">


<i class="fa-solid fa-plus"></i>


Add Movie


</a>


</section>







<!-- ======================
 TOOLBAR
====================== -->


<section class="admin-panel">



<div class="manage-toolbar">



<div class="search-box">


<i class="fa-solid fa-search"></i>


<input

id="movieSearch"

placeholder="Search movie...">


</div>






<select id="movieFilter">


<option value="all">

All Categories

</option>


<option>

Action

</option>


<option>

Indian

</option>


<option>

Comedy

</option>


<option>

Highschool

</option>


</select>



</div>



</section>







<!-- ======================
 MOVIE TABLE
====================== -->


<section class="admin-panel">



<div class="panel-header">


<h2>

Movies

<span id="movieTotal">

0

</span>


</h2>


</div>





<div class="table-container">



<table class="admin-table">



<thead>


<tr>


<th>

Poster

</th>



<th>

Title

</th>



<th>

Category

</th>



<th>

Quality

</th>



<th>

TMDB

</th>



<th>

Actions

</th>


</tr>


</thead>

<tbody id="movieTable">


</tbody>



</table>


</div>

</section>
<!-- ======================================================
     EDIT MOVIE MODAL
====================================================== -->


<div

id="editMovieModal"

class="admin-modal">



<div class="modal-box">



<div class="modal-header">


<h2>

Edit Movie

</h2>


<button

id="closeModal"

class="close-btn">


<i class="fa-solid fa-xmark"></i>


</button>


</div>







<div class="form-group">


<label>

Movie Title

</label>


<input

id="editTitle"

type="text">


</div>






<div class="form-group">


<label>

Description

</label>


<textarea

id="editDescription">

</textarea>


</div>







<div class="form-grid">



<div class="form-group">


<label>

Category

</label>


<select id="editCategory">


<option>

Action

</option>


<option>

Indian

</option>


<option>

Comedy

</option>


<option>

Highschool

</option>


<option>

Other

</option>


</select>


</div>







<div class="form-group">


<label>

Quality

</label>


<select id="editQuality">


<option>

480p

</option>


<option>

720p HD

</option>


<option>

1080p Full HD

</option>


<option>

4K UHD

</option>


</select>


</div>


</div>







<button

id="saveMovieEdit"

class="primary-btn">


<i class="fa-solid fa-save"></i>


Save Changes


</button>



</div>


</div>









<!-- ======================================================
 FOOTER
====================================================== -->


<footer class="admin-footer">


<img

src="../assets/logo.png"

class="footer-logo">



<p>

© 2026 KivuStream Admin

</p>


<span>

Powered by IT HAWK_RW

</span>



</footer>


</main>


</div>

<!-- ======================================================
 SCRIPTS
====================================================== -->
<script src="../js/config.js"></script>

<script src="../js/supabase.js"></script>

<script src="guard.js"></script>

<script src="js/admin.js"></script>


<script src="js/manage-movies.js"></script>
</body>

</html>
