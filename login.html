<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>KivuStream | Login</title>

<link
rel="icon"
href="assets/favicon.png">

<link
rel="stylesheet"
href="css/global.css">

<link
rel="stylesheet"
href="css/navbar.css">

<link
rel="stylesheet"
href="css/login.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="cinematic-bg">

<div class="gradient"></div>

<div class="particles"></div>

</div>



<div class="login-container">

<div
class="login-card"
id="loginCard">

<div class="logo">

<img
src="assets/logo.png"
alt="KivuStream">

<h1>

KivuStream

</h1>

<p>

Premium Movie Streaming

</p>

</div>



<form
id="loginForm">

<div class="input-group">

<i
class="fa-solid fa-envelope">

</i>

<input

type="email"

id="email"

placeholder="Email Address"

required>

</div>



<div class="input-group">

<i
class="fa-solid fa-lock">

</i>

<input

type="password"

id="password"

placeholder="Password"

required>

<button

type="button"

id="togglePassword"

class="eye-btn">

<i
class="fa-solid fa-eye">

</i>

</button>

</div>



<div class="options">

<label>

<input

type="checkbox"

id="remember">

Remember Me

</label>

<a
href="forgot.html">

Forgot Password?

</a>

</div>



<button

type="submit"

class="login-btn">

<i class="fa-solid fa-right-to-bracket"></i>

Login

</button>

</form>



<div class="divider">

<span>

OR

</span>

</div>



<button

id="googleLogin"

class="google-btn">

<i class="fa-brands fa-google"></i>

Continue with Google

</button>



<div class="links">

<p>

Don't have an account?

<a
href="signup.html">

Create Account

</a>

</p>

</div>

</div>

</div>



<div
id="loadingOverlay"
class="loading-overlay">

<div class="loader"></div>

<p>

Signing you in...

</p>

</div>



<script src="js/config.js"></script>

<script src="js/supabase.js"></script>

<script src="js/login.js"></script>

</body>

</html>
